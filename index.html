<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alta &amp; George: Skyward</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html { height:-webkit-fill-available; }
        body {
            width:100vw; height:100vh;
            min-height:-webkit-fill-available; min-height:100dvh;
            overflow:hidden; touch-action:none; background:#0a1a2e;
        }
        canvas { display:block; position:absolute; top:0; left:0; }
        #ui { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }

        #hud {
            position:absolute; top:14px; right:14px;
            font-family:Georgia,serif; font-size:1.05rem; color:#fff;
            text-shadow:0 2px 8px rgba(0,40,100,.6);
        }
        #progress-bar {
            position:absolute; right:10px; top:50px;
            width:10px; height:150px;
            background:rgba(255,255,255,.22); border-radius:5px; overflow:hidden;
        }
        #progress-fill {
            position:absolute; bottom:0; width:100%;
            background:linear-gradient(to top,#FFD93D,#f28b47);
            border-radius:5px; height:0;
        }

        .screen {
            position:absolute; inset:0;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            pointer-events:all;
        }
        .screen h1 {
            font-family:Georgia,serif; font-style:italic; color:#fff;
            font-size:clamp(1.5rem,5vw,2.6rem);
            text-shadow:0 3px 16px rgba(0,40,120,.7); margin-bottom:10px;
        }
        .screen p {
            font-family:Georgia,serif; color:rgba(255,255,255,.92);
            font-size:clamp(.82rem,2.5vw,1.0rem);
            text-align:center; max-width:280px; margin-bottom:6px;
            text-shadow:0 2px 8px rgba(0,40,120,.5); line-height:1.5;
        }
        .btn {
            margin-top:20px; padding:12px 32px;
            font-family:Georgia,serif; font-size:1.05rem; font-style:italic;
            background:rgba(255,255,255,.92); color:#2255aa;
            border:none; border-radius:28px; cursor:pointer;
            box-shadow:0 4px 20px rgba(0,0,0,.25); pointer-events:all;
        }
        .btn:active { background:#fff; transform:scale(.97); }
        .prizes { font-size:3rem; margin:12px 0; letter-spacing:16px; }
        #start-screen { background:rgba(20,70,160,.42); }
        #win-screen   { background:rgba(20,70,160,.52); overflow-y:auto; padding:20px 0; }
        .hidden { display:none!important; }

        #timer-display {
            position:absolute; top:14px; left:14px;
            font-family:Georgia,serif; font-size:1.05rem; color:#fff;
            text-shadow:0 2px 8px rgba(0,40,100,.6);
        }
        #name-phase { display:flex; flex-direction:column; align-items:center; margin-top:6px; }
        #player-name {
            padding:10px 16px; border-radius:20px; border:none;
            font-family:Georgia,serif; font-size:1rem;
            text-align:center; width:200px; outline:none;
            background:rgba(255,255,255,.92); color:#224;
        }
        #leaderboard-wrap { width:100%; max-width:280px; margin-top:10px; }
        #leaderboard-wrap h3 {
            font-family:Georgia,serif; font-style:italic; color:#FFD93D;
            font-size:1.1rem; text-align:center; margin-bottom:8px;
            text-shadow:0 2px 8px rgba(0,0,0,.4);
        }
        .lb-row {
            display:flex; justify-content:space-between; align-items:center;
            font-family:Georgia,serif; font-size:0.88rem; color:rgba(255,255,255,.9);
            padding:4px 10px; border-radius:8px;
        }
        .lb-row.me   { background:rgba(255,220,40,.22); color:#FFD93D; font-weight:bold; }
        .lb-row.top1 { color:#FFD93D; }
        .lb-rank { width:22px; text-align:right; margin-right:8px; opacity:.7; }
        .lb-name { flex:1; }
        .lb-time { margin-left:8px; font-variant-numeric:tabular-nums; }
        #lb-status { font-family:Georgia,serif; font-size:.85rem; color:rgba(255,255,255,.6);
                     text-align:center; margin-top:6px; }
    </style>
</head>
<body>
<canvas id="gc"></canvas>
<div id="ui">
    <div id="hud"          class="hidden">Height: 0m</div>
    <div id="timer-display" class="hidden">0:00</div>
    <div id="progress-bar" class="hidden"><div id="progress-fill"></div></div>

    <div id="start-screen" class="screen">
        <h1>Alta &amp; George: Skyward</h1>
        <p>Guide the balloon to the top of the sky!</p>
        <p>Move your finger near the balloon to push it — position below to float upward.</p>
        <button class="btn" id="start-btn">Launch! 🎈</button>
    </div>

    <div id="win-screen" class="screen hidden">
        <h1>You made it! 🎉</h1>
        <p>Alta and George soared to the very top!</p>
        <div class="prizes">🍼🦴</div>
        <p id="win-txt"></p>
        <div id="name-phase">
            <p style="margin-bottom:8px">Enter your name for the leaderboard:</p>
            <input id="player-name" type="text" maxlength="18" placeholder="Your name" autocomplete="off">
            <button class="btn" id="submit-btn">Submit score</button>
        </div>
        <div id="leaderboard-wrap" class="hidden">
            <h3>🏆 Top 10 Fastest Wins</h3>
            <div id="lb-rows"></div>
            <div id="lb-status"></div>
        </div>
        <button class="btn" id="again-btn">Fly again 🎈</button>
    </div>
</div>

<script>
// ════════════════════════ SUPABASE CONFIG ════════════════════════
const SUPABASE_URL  = 'https://oosufsveqqkdcufuctur.supabase.co';
const SUPABASE_ANON = 'sb_publishable_VjECbpH9j-C1Iu9hG73Gpw_TYtI-KBx';

// ════════════════════════ WORLD CONSTANTS ════════════════════════
const WORLD_H    = 6000;
const WIN_Y      = 280;
const GRAVITY    = 0.1125;
const REP_RAD    = 420;
const REP_FORCE  = 8000;
const DAMPING    = 0.93;
const BOUNCE_E   = 0.42;
const S          = 0.75;                    // balloon draw scale (SVG 200×280)
const OX         = -100 * S;               // −75
const OY         = -140 * S;               // −105
const BSKT_BOT   = Math.round(113 * S);    //  85 — basket bottom offset from centre
const ENV_HW     = Math.round(78  * S);    //  59 — envelope half-width
const FOX_W      = 90;
const FOX_H      = 65;

// Fur-cloud prize shapes (circles centred at 0,0)
const BOTTLE_CIRCLES = [
    {cx:0, cy: 50, r:52}, {cx:0, cy: -5, r:46},
    {cx:0, cy:-52, r:28}, {cx:0, cy:-82, r:21}, {cx:0, cy:-106, r:18},
];
const BONE_CIRCLES = [
    {cx:-72,cy:-13,r:24},{cx:-72,cy:13,r:24},
    {cx:-30,cy:0,r:16},{cx:0,cy:0,r:16},{cx:30,cy:0,r:16},
    {cx:72,cy:-13,r:24},{cx:72,cy:13,r:24},
];

// Stars — fixed positions, drawn in screen coords, fade in as balloon approaches top
const STARS = Array.from({length: 60}, () => ({
    x: Math.random(),                      // fraction of GAME_W
    y: Math.random() * 0.78,              // upper 78% of screen height
    r: 0.5 + Math.random() * 1.5,
    t: Math.random() * Math.PI * 2,       // twinkle phase offset
}));

// ════════════════════════ CANVAS + GAME AREA ════════════════════════
const canvas = document.getElementById('gc');
const ctx    = canvas.getContext('2d');
let W=0, H=0, GAME_W=0, GAME_X=0;

function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    GAME_W = Math.min(W, 430);      // portrait strip — max 430 px
    GAME_X = Math.floor((W - GAME_W) / 2);
}
resize();
window.addEventListener('resize', resize);

// ════════════════════════ ASSETS ════════════════════════
let furImg=null, altaImg=null, georgeImg=null, foxCanvas=null;

// Normalise an image through an offscreen canvas — fixes iOS Safari colour-profile tinting
function normalise(img) {
    if (!img) return null;
    const oc = document.createElement('canvas');
    oc.width = img.naturalWidth || FOX_W;
    oc.height = img.naturalHeight || FOX_H;
    oc.getContext('2d').drawImage(img, 0, 0);
    return oc;
}

function loadAssets() {
    const mk = src => new Promise(res => {
        const i = new Image();
        i.onload = () => res(i);
        i.onerror = () => res(null);
        i.src = src;
    });
    return Promise.all([
        mk('images/alta-fur.jpg'),
        mk('images/alta.jpg'),
        mk('images/george.jpg'),
        mk('images/fox.png').then(img => img || mk('images/fox.jpg')),
    ]).then(([f,a,g,x]) => { furImg=f; altaImg=a; georgeImg=g; foxCanvas=normalise(x); });
}

// ════════════════════════ STATE ════════════════════════
let state = 'start';
let bx, by, vx, vy, camTop, topScore, bgClouds, foxLanes, tick, foxHitTimer, firstFoxSeen, firstFoxTimer;
let nappyDropped, nappyActive, nappyX, nappyWorldY, nappyVy, nappyBannerTimer, boostActive;
let mx=-9999, my=-9999, gameStartTime=0;

function initGame() {
    bx = GAME_W / 2; by = WORLD_H - 200;
    vx = 0; vy = 0;
    camTop = by - H * 0.6;
    topScore = 0; tick = 0; foxHitTimer = 0; firstFoxSeen = false; firstFoxTimer = 0;
    nappyDropped = false; nappyActive = false; boostActive = false;
    nappyX = 0; nappyWorldY = 0; nappyVy = 0; nappyBannerTimer = 0;
    generateClouds();
    generateFoxes();
}

// ════════════════════════ GENERATION ════════════════════════
const CLOUD_TEMPLATES = [
    // Fluffy round — overlapping domes, wide and billowy
    [
        {cx:50, cy:74,r:42},{cx:100,cy:46,r:52},{cx:158,cy:40,r:56},
        {cx:212,cy:58,r:44},{cx:242,cy:78,r:30},{cx:130,cy:90,r:36},
    ],
    // Tall cumulonimbus — wide base, rising column, single peaked dome
    [
        {cx:88, cy:112,r:44},{cx:142,cy:110,r:42},
        {cx:68, cy:70, r:38},{cx:115,cy:52, r:48},{cx:162,cy:68,r:40},
        {cx:112,cy:18, r:44},
    ],
    // Long wispy — elongated streak, narrows at the trailing end
    [
        {cx:18, cy:52,r:26},{cx:62, cy:36,r:34},{cx:110,cy:28,r:40},
        {cx:158,cy:32,r:36},{cx:200,cy:42,r:30},{cx:234,cy:52,r:22},
    ],
];

function generateClouds() {
    bgClouds = [];
    let idx = 0;
    for (let y=50; y<WORLD_H; y += 160+Math.random()*260) {
        const template = CLOUD_TEMPLATES[Math.floor(Math.random()*CLOUD_TEMPLATES.length)];
        const sc = 0.7+Math.random()*1.1;
        const minCx = Math.min(...template.map(c=>c.cx-c.r));
        const maxCx = Math.max(...template.map(c=>c.cx+c.r));
        const xMin = Math.max(0, -minCx * sc);
        const xMax = Math.max(xMin+1, GAME_W - maxCx * sc);
        // Rotate through left / centre / right thirds + small jitter
        // so consecutive clouds are always horizontally staggered
        const zone = (idx % 3) / 3;
        const frac = Math.max(0, Math.min(1, zone + (Math.random()-0.5)*0.22));
        bgClouds.push({
            x: xMin + frac*(xMax-xMin), y, sc,
            circles: template,
        });
        idx++;
    }
}

function generateFoxes() {
    foxLanes = [];
    // Spread fox lanes throughout the world, avoiding the very start and win zone
    for (let y=WORLD_H*0.08; y<WORLD_H*0.92; y += 1520+Math.random()*1680) {
        foxLanes.push({
            worldY: y - FOX_H/2,         // centre the fox vertically on the lane
            x: -FOX_W - Math.random()*GAME_W, // staggered start off left edge
            speed: 1.4+Math.random()*1.8,
        });
    }
}

// ════════════════════════ DRAWING ════════════════════════

function drawBackground() {
    const prog = Math.max(0,Math.min(1,(WORLD_H-by)/(WORLD_H-WIN_Y)));
    const g = ctx.createLinearGradient(0,0,0,H);
    if (prog<0.65) {
        g.addColorStop(0,'#2e7dc4'); g.addColorStop(.45,'#5ba4e5');
        g.addColorStop(.8,'#87ceeb'); g.addColorStop(1,'#c8e8f7');
    } else {
        g.addColorStop(0,'#1a3060'); g.addColorStop(.35,'#2a6ab0');
        g.addColorStop(.75,'#87ceeb'); g.addColorStop(1,'#c8e8f7');
    }
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

    // Dark pillarbox on desktop
    if (GAME_X>0) {
        ctx.fillStyle='rgba(5,15,35,0.82)';
        ctx.fillRect(0,0,GAME_X,H);
        ctx.fillRect(GAME_X+GAME_W,0,W-GAME_X-GAME_W,H);
    }
}

// Generic fur-cloud shape renderer (circles[] centred at cx,cy)
function drawFurShape(circles, cx, cy) {
    if (!furImg) return;
    let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
    circles.forEach(c=>{
        minX=Math.min(minX,c.cx-c.r); maxX=Math.max(maxX,c.cx+c.r);
        minY=Math.min(minY,c.cy-c.r); maxY=Math.max(maxY,c.cy+c.r);
    });
    const fw=maxX-minX, fh=maxY-minY;
    ctx.save(); ctx.translate(cx,cy);
    ctx.beginPath();
    circles.forEach(c=>{ ctx.moveTo(c.cx+c.r,c.cy); ctx.arc(c.cx,c.cy,c.r,0,Math.PI*2); });
    ctx.save(); ctx.clip();
    ctx.drawImage(furImg,minX,minY,fw,fh);
    ctx.fillStyle='rgba(255,255,255,0.48)'; ctx.fillRect(minX,minY,fw,fh);
    ctx.restore();
    // soft white halo edge
    ctx.beginPath();
    circles.forEach(c=>ctx.arc(c.cx,c.cy,c.r,0,Math.PI*2));
    ctx.strokeStyle='rgba(255,255,255,0.55)'; ctx.lineWidth=2.5; ctx.stroke();
    ctx.restore();
}

function drawBgCloud(c) {
    if (!furImg) return;
    ctx.save();
    ctx.translate(c.x,c.y); ctx.scale(c.sc,c.sc);
    const minX=Math.min(...c.circles.map(o=>o.cx-o.r));
    const minY=Math.min(...c.circles.map(o=>o.cy-o.r));
    const maxX=Math.max(...c.circles.map(o=>o.cx+o.r));
    const maxY=Math.max(...c.circles.map(o=>o.cy+o.r));
    const minCy =Math.min(...c.circles.map(o=>o.cy));
    const coreLX=Math.min(...c.circles.map(o=>o.cx));
    const coreRX=Math.max(...c.circles.map(o=>o.cx));
    const bw=maxX-minX, bh=maxY-minY;
    ctx.beginPath();
    // moveTo before each arc keeps circles as independent subpaths,
    // preventing auto-connecting lines that create gaps in the clip region
    c.circles.forEach(o=>{ ctx.moveTo(o.cx+o.r,o.cy); ctx.arc(o.cx,o.cy,o.r,0,Math.PI*2); });
    // Core rect spans only between circle CENTRES — fills interior gaps without
    // overriding the natural circular silhouette at the left and right outer edges
    ctx.rect(coreLX, minCy, coreRX-coreLX, maxY-minCy+2);
    ctx.save(); ctx.clip();
    ctx.drawImage(furImg,minX,minY,bw,bh);
    ctx.fillStyle='rgba(255,255,255,0.52)'; ctx.fillRect(minX,minY,bw,bh);
    ctx.restore(); ctx.restore();
}

function drawWinZone() {
    if (WIN_Y < camTop-200 || WIN_Y > camTop+H+20) return;
    // Glow
    const g=ctx.createRadialGradient(GAME_W/2,WIN_Y-80,10,GAME_W/2,WIN_Y-80,180);
    g.addColorStop(0,'rgba(255,220,40,0.45)'); g.addColorStop(1,'rgba(255,220,40,0)');
    ctx.fillStyle=g; ctx.fillRect(0,WIN_Y-230,GAME_W,230);

    // Cartoon emoji prizes with gentle bob
    const bob = 6*Math.sin(tick*0.045);
    const prizeSize = Math.round(GAME_W * 0.22);
    ctx.font = `${prizeSize}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('🍼', GAME_W*0.32, WIN_Y-110+bob);
    ctx.fillText('🦴', GAME_W*0.68, WIN_Y-110-bob);

    // Goal line
    const lg=ctx.createLinearGradient(0,0,GAME_W,0);
    lg.addColorStop(0,'rgba(255,220,0,0)'); lg.addColorStop(.15,'rgba(255,220,0,0.9)');
    lg.addColorStop(.85,'rgba(255,220,0,0.9)'); lg.addColorStop(1,'rgba(255,220,0,0)');
    ctx.fillStyle=lg; ctx.fillRect(0,WIN_Y-3,GAME_W,6);
}

function drawFox(fox) {
    const y = fox.worldY;
    if (foxCanvas) {
        ctx.drawImage(foxCanvas, fox.x, y, FOX_W, FOX_H);
    } else {
        // emoji fallback
        ctx.font = `${FOX_H*0.85}px sans-serif`;
        ctx.textAlign = 'left';
        ctx.fillText('🦊', fox.x, y+FOX_H*0.85);
    }
}

function envelopePath() {
    ctx.moveTo(OX+100*S,OY+8*S);
    ctx.bezierCurveTo(OX+148*S,OY+8*S,  OX+178*S,OY+44*S, OX+178*S,OY+92*S);
    ctx.bezierCurveTo(OX+178*S,OY+140*S,OX+148*S,OY+170*S,OX+100*S,OY+178*S);
    ctx.bezierCurveTo(OX+52*S, OY+170*S,OX+22*S, OY+140*S,OX+22*S, OY+92*S);
    ctx.bezierCurveTo(OX+22*S, OY+44*S, OX+52*S, OY+8*S,  OX+100*S,OY+8*S);
    ctx.closePath();
}

function photoCircle(img,cx,cy,r,zoom=1,yBias=0.25) {
    if (!img) return;
    ctx.save();
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.clip();
    // Square crop — yBias (0=top, 0.5=centre, 1=bottom) controls vertical position
    const size = Math.min(img.width, img.height) / zoom;
    const sx = (img.width  - size) / 2;
    const sy = (img.height - size) * yBias;
    ctx.drawImage(img, sx, sy, size, size, cx-r, cy-r, r*2, r*2);
    ctx.restore();
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.strokeStyle='rgba(122,92,16,0.5)'; ctx.lineWidth=1; ctx.stroke();
}

function drawBalloon(cx,cy,tiltRad) {
    ctx.save();
    ctx.translate(cx,cy); ctx.rotate(tiltRad);

    // Shadow
    ctx.save(); ctx.translate(4,8);
    ctx.beginPath(); envelopePath();
    ctx.fillStyle='rgba(0,0,0,0.12)'; ctx.fill(); ctx.restore();

    // Fur-textured envelope
    ctx.save();
    ctx.beginPath(); envelopePath(); ctx.clip();
    if (furImg) { ctx.drawImage(furImg,OX+22*S,OY+8*S,156*S,170*S); }
    else { ctx.fillStyle='#ddd'; ctx.fillRect(OX,OY,200*S,200*S); }
    ctx.restore();

    // Outline
    ctx.beginPath(); envelopePath();
    ctx.strokeStyle='rgba(160,160,160,0.55)'; ctx.lineWidth=1.5; ctx.stroke();

    // Specular highlight
    ctx.save(); ctx.beginPath(); envelopePath(); ctx.clip();
    ctx.save(); ctx.translate(OX+70*S,OY+68*S); ctx.rotate(-18*Math.PI/180);
    ctx.beginPath(); ctx.ellipse(0,0,16*S,26*S,0,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.28)'; ctx.fill();
    ctx.restore(); ctx.restore();

    // Ropes
    ctx.strokeStyle='#7a5c10'; ctx.lineWidth=1.5;
    [[52,172,63,204],[74,177,72,204],[100,178,100,204],[126,177,128,204],[148,172,137,204]]
    .forEach(([x1,y1,x2,y2])=>{
        ctx.beginPath(); ctx.moveTo(OX+x1*S,OY+y1*S); ctx.lineTo(OX+x2*S,OY+y2*S); ctx.stroke();
    });

    // Basket
    const bkX=OX+60*S,bkY=OY+198*S,bkW=80*S,bkH=55*S,bkR=5*S;
    ctx.beginPath();
    ctx.moveTo(bkX+bkR,bkY); ctx.arcTo(bkX+bkW,bkY,bkX+bkW,bkY+bkR,bkR);
    ctx.arcTo(bkX+bkW,bkY+bkH,bkX+bkW-bkR,bkY+bkH,bkR);
    ctx.arcTo(bkX,bkY+bkH,bkX,bkY+bkH-bkR,bkR); ctx.arcTo(bkX,bkY,bkX+bkR,bkY,bkR);
    ctx.closePath();
    ctx.fillStyle='#c8a565'; ctx.fill();
    ctx.strokeStyle='#7a5c10'; ctx.lineWidth=2; ctx.stroke();
    ctx.fillStyle='#a87c3a'; ctx.fillRect(OX+58*S,OY+196*S,84*S,8*S);
    ctx.strokeStyle='rgba(122,92,16,0.4)'; ctx.lineWidth=1;
    [[80,204,80,253],[100,204,100,253],[120,204,120,253],[60,220,140,220],[60,236,140,236]]
    .forEach(([x1,y1,x2,y2])=>{
        ctx.beginPath(); ctx.moveTo(OX+x1*S,OY+y1*S); ctx.lineTo(OX+x2*S,OY+y2*S); ctx.stroke();
    });

    photoCircle(altaImg,   OX+79*S,  OY+208*S, 32*S, 1.6, 0.33);
    photoCircle(georgeImg, OX+121*S, OY+210*S, 29*S, 1.6, 0.50);
    ctx.restore();
}

// ════════════════════════ LEADERBOARD HELPERS ════════════════════════
function formatTime(ms) {
    const tot = Math.floor(ms / 1000);
    return `${Math.floor(tot / 60)}:${String(tot % 60).padStart(2, '0')}`;
}

async function fetchLeaderboard() {
    try {
        const res = await fetch(
            `${SUPABASE_URL}/rest/v1/scores?select=name,time_seconds&order=time_seconds.asc&limit=10`,
            { headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` } }
        );
        return res.ok ? await res.json() : [];
    } catch { return []; }
}

async function saveScore(name, timeSec) {
    try {
        await fetch(`${SUPABASE_URL}/rest/v1/scores`, {
            method: 'POST',
            headers: {
                apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}`,
                'Content-Type': 'application/json', Prefer: 'return=minimal'
            },
            body: JSON.stringify({ name, time_seconds: timeSec })
        });
    } catch {}
}

// ════════════════════════ UPDATE ════════════════════════
function update() {
    if (state !== 'playing') return;
    tick++;

    // Fox hit stun — hold balloon still briefly, then release
    if (foxHitTimer > 0) { foxHitTimer--; return; }

    const boost = boostActive ? 1.5 : 1;
    vy += GRAVITY * (boostActive ? -0.4 : 1);   // balloon floats upward by default after nappy drop
    vx += Math.sin(tick*0.00045)*0.06 * boost;
    vy += Math.sin(tick*0.00058+1.2)*0.07 * boost;

    // Repulsion — convert screen mouse to game-local coords, then world Y
    const gameMx = mx - GAME_X;   // screen X → game X
    const worldMy = my + camTop;  // screen Y → world Y
    const dx = bx-gameMx, dy = by-worldMy;
    const dist = Math.hypot(dx,dy)||0.001;
    if (dist<REP_RAD) {
        const f = REP_FORCE * boost / Math.max(dist*dist, 2500);
        vx+=(dx/dist)*f; vy+=(dy/dist)*f;
    }

    // Wind — slow sinusoid (~20 s period), shared between balloon and clouds
    const windV = 1.4 * Math.sin(tick * 0.0052);  // px/frame, ±1.4 max
    vx += windV * 0.09 * boost;                    // gentle push on balloon

    // Nappy drop at halfway — jettison dead weight, unlock 50% boost
    if (!nappyDropped && by < WORLD_H / 2) {
        nappyDropped = true; nappyActive = true; boostActive = true;
        nappyX = bx; nappyWorldY = by + BSKT_BOT + 10; nappyVy = 0.2;
        nappyBannerTimer = 204;
    }
    if (nappyActive) {
        nappyVy += 0.05;
        nappyWorldY += nappyVy;
        if (nappyWorldY > camTop + H + 120) nappyActive = false;
    }
    if (nappyBannerTimer > 0) nappyBannerTimer--;

    vx*=DAMPING; vy*=DAMPING;
    if (Math.abs(vx)>5) vx=5*Math.sign(vx);
    if (Math.abs(vy)>5) vy=5*Math.sign(vy);
    bx+=vx; by+=vy;

    // Soft wall — gradual repulsion starts 70 px from each edge
    const wallZone = 70;
    const leftGap  = bx - ENV_HW;
    const rightGap = GAME_W - (bx + ENV_HW);
    if (leftGap  < wallZone) vx += 0.5 * (1 - leftGap  / wallZone);
    if (rightGap < wallZone) vx -= 0.5 * (1 - rightGap / wallZone);
    // Hard boundary backstop — guaranteed minimum kick so balloon never sticks
    if (bx-ENV_HW < 0)       { bx=ENV_HW;        vx= Math.max(Math.abs(vx)*BOUNCE_E, 1.5); }
    if (bx+ENV_HW > GAME_W)  { bx=GAME_W-ENV_HW; vx=-Math.max(Math.abs(vx)*BOUNCE_E, 1.5); }

    // Soft floor
    const floor=WORLD_H-80;
    if (by+BSKT_BOT>floor) { by=floor-BSKT_BOT; vy=-Math.abs(vy)*BOUNCE_E; }
    if (by<10) { by=10; vy=Math.abs(vy)*BOUNCE_E; }

    // Camera — only scrolls up
    const targetTop=by-H*0.38;
    if (targetTop<camTop) camTop=targetTop;

    // Update foxes
    foxLanes.forEach(fox => {
        fox.x += fox.speed;
        if (fox.x > GAME_W+FOX_W) fox.x = -FOX_W;
    });

    // Drift clouds with the same wind; wrap when they leave the game area
    (bgClouds||[]).forEach(c => {
        c.x += windV;
        const minCx = Math.min(...c.circles.map(o=>(o.cx-o.r))) * c.sc;
        const maxCx = Math.max(...c.circles.map(o=>(o.cx+o.r))) * c.sc;
        if (c.x + minCx > GAME_W)  c.x -= GAME_W + (maxCx - minCx);
        if (c.x + maxCx < 0)       c.x += GAME_W + (maxCx - minCx);
    });

    // First-fox-seen banner
    if (!firstFoxSeen && firstFoxTimer === 0) {
        for (const fox of foxLanes) {
            if (fox.worldY > camTop - FOX_H && fox.worldY < camTop + H + FOX_H) {
                firstFoxSeen = true; firstFoxTimer = 184; break;
            }
        }
    }
    if (firstFoxTimer > 0) firstFoxTimer--;

    // Fox collision — check foxes near the balloon's world Y
    const ballTop=by-40, ballBot=by+BSKT_BOT;
    for (const fox of foxLanes) {
        if (fox.x+FOX_W < bx-ENV_HW || fox.x > bx+ENV_HW) continue;
        if (fox.worldY+FOX_H < ballTop || fox.worldY > ballBot) continue;
        // HIT — send back to bottom
        by=WORLD_H-200; vx=0; vy=-2;
        camTop=by-H*0.6;
        foxHitTimer=70; // ~1.15 s stun
        return;
    }

    // Score + timer HUD
    const h=Math.max(0,Math.floor((WORLD_H-by)/10));
    if (h>topScore) topScore=h;
    document.getElementById('hud').textContent=`Height: ${topScore}m`;
    document.getElementById('timer-display').textContent = formatTime(Date.now()-gameStartTime);
    const pct=Math.min(1,Math.max(0,(WORLD_H-by-100)/(WORLD_H-WIN_Y-100)));
    document.getElementById('progress-fill').style.height=(pct*100)+'%';

    // Win
    if (by<WIN_Y) endGame();
}

// ════════════════════════ RENDER ════════════════════════
function render() {
    ctx.clearRect(0,0,W,H);
    drawBackground();

    // Night sky + stars — fade in as balloon climbs above 50% of the world
    const prog = Math.max(0, Math.min(1, (WORLD_H-by) / (WORLD_H-WIN_Y)));
    if (prog > 0.75) {
        const t = Math.min(1, (prog - 0.75) / 0.25);  // 0→1 over the top quarter
        // Darken the game strip progressively
        ctx.save();
        ctx.fillStyle = `rgba(4,8,28,${(t * 0.55).toFixed(3)})`;
        ctx.fillRect(GAME_X, 0, GAME_W, H);
        // Draw stars inside game strip only
        ctx.beginPath(); ctx.rect(GAME_X, 0, GAME_W, H); ctx.clip();
        ctx.fillStyle = '#ffffff';
        STARS.forEach(s => {
            const twinkle = 0.55 + 0.45 * Math.sin(tick * 0.038 + s.t);
            ctx.globalAlpha = t * twinkle;
            ctx.beginPath();
            ctx.arc(GAME_X + s.x * GAME_W, s.y * H, s.r, 0, Math.PI*2);
            ctx.fill();
        });
        ctx.restore();
    }

    // Clip to portrait game strip and apply camera
    ctx.save();
    ctx.beginPath(); ctx.rect(GAME_X,0,GAME_W,H); ctx.clip();
    ctx.translate(GAME_X,-camTop);

    (bgClouds||[]).forEach(c=>{
        if (c.y+200*c.sc>camTop-20&&c.y<camTop+H+20) drawBgCloud(c);
    });
    drawWinZone();
    (foxLanes||[]).forEach(fox=>{
        const sy=fox.worldY-camTop;
        if (sy>-FOX_H&&sy<H+FOX_H) drawFox(fox);
    });
    if (nappyActive) {
        ctx.font = `${Math.round(GAME_W * 0.14)}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.fillText('💩', nappyX, nappyWorldY);
    }

    const tilt=Math.min(Math.max(vx*1.6,-14),14)*Math.PI/180;
    drawBalloon(bx,by,tilt);

    ctx.restore();

    // "Nappy overboard" banner + boost notification
    if (nappyBannerTimer > 0) {
        const fade = nappyBannerTimer < 50 ? nappyBannerTimer / 50 : Math.min(1, (204 - nappyBannerTimer) / 25);
        ctx.save();
        ctx.beginPath(); ctx.rect(GAME_X, 0, GAME_W, H); ctx.clip();
        ctx.globalAlpha = fade;
        ctx.fillStyle = 'rgba(0,0,0,0.45)';
        ctx.fillRect(GAME_X, H * 0.3, GAME_W, H * 0.2);
        ctx.fillStyle = '#fff';
        ctx.font = `italic bold ${Math.round(GAME_W * 0.088)}px Georgia`;
        ctx.textAlign = 'center';
        ctx.fillText('💩  Nappy overboard!', GAME_X + GAME_W / 2, H * 0.4);
        ctx.font = `italic ${Math.round(GAME_W * 0.058)}px Georgia`;
        ctx.fillStyle = '#FFD93D';
        ctx.fillText('The balloon is lighter! 🎈', GAME_X + GAME_W / 2, H * 0.46);
        ctx.restore();
    }

    // "The bad fox" first-appearance banner
    if (firstFoxTimer > 0) {
        const fade = firstFoxTimer < 50 ? firstFoxTimer / 50 : Math.min(1, (184 - firstFoxTimer) / 25);
        ctx.save();
        ctx.beginPath(); ctx.rect(GAME_X, 0, GAME_W, H); ctx.clip();
        ctx.globalAlpha = fade;
        ctx.fillStyle = 'rgba(0,0,0,0.45)';
        ctx.fillRect(GAME_X, H * 0.3, GAME_W, H * 0.18);
        ctx.fillStyle = '#fff';
        ctx.font = `italic bold ${Math.round(GAME_W * 0.092)}px Georgia`;
        ctx.textAlign = 'center';
        ctx.fillText('🦊  the bad fox  🦊', GAME_X + GAME_W / 2, H * 0.415);
        ctx.restore();
    }

    // Fox hit flash — red overlay on game strip
    if (foxHitTimer>0) {
        const alpha=Math.min(0.55,(foxHitTimer/70)*0.55);
        ctx.save();
        ctx.fillStyle=`rgba(200,20,20,${alpha})`;
        ctx.fillRect(GAME_X,0,GAME_W,H);
        ctx.fillStyle=`rgba(255,255,255,${alpha*0.9})`;
        ctx.font=`bold ${Math.round(H*0.06)}px Georgia`;
        ctx.textAlign='center';
        ctx.fillText('🦊  Watch out!', GAME_X+GAME_W/2, H*0.45);
        ctx.restore();
    }
}

// ════════════════════════ STATE ════════════════════════
function endGame() {
    state = 'win';
    const elapsed = Date.now() - gameStartTime;
    window._lastWinMs  = elapsed;
    window._lastWinSec = elapsed / 1000;

    document.getElementById('hud').classList.add('hidden');
    document.getElementById('timer-display').classList.add('hidden');
    document.getElementById('progress-bar').classList.add('hidden');
    document.getElementById('win-txt').textContent =
        `You soared ${topScore}m in ${formatTime(elapsed)}!`;

    const pb = parseFloat(localStorage.getItem('ag_best') || 'Infinity');
    if (elapsed / 1000 < pb) localStorage.setItem('ag_best', elapsed / 1000);

    document.getElementById('name-phase').style.display = '';
    document.getElementById('player-name').value = '';
    document.getElementById('leaderboard-wrap').classList.add('hidden');
    document.getElementById('lb-rows').innerHTML = '';
    document.getElementById('lb-status').textContent = '';
    document.getElementById('win-screen').classList.remove('hidden');
}

function startGame() {
    ['start-screen','win-screen'].forEach(id=>document.getElementById(id).classList.add('hidden'));
    document.getElementById('hud').classList.remove('hidden');
    document.getElementById('timer-display').classList.remove('hidden');
    document.getElementById('timer-display').textContent = '0:00';
    document.getElementById('progress-bar').classList.remove('hidden');
    initGame(); state = 'playing';
    gameStartTime = Date.now();
}

// ════════════════════════ INPUT ════════════════════════
window.addEventListener('mousemove',  e=>{mx=e.clientX;my=e.clientY;});
window.addEventListener('mouseleave',()=>{mx=my=-9999;});
window.addEventListener('touchstart',e=>{
    if(e.target.closest('button,input,textarea,select')) return;
    e.preventDefault(); mx=e.touches[0].clientX; my=e.touches[0].clientY;
},{passive:false});
window.addEventListener('touchmove',e=>{
    if(e.target.closest('button,input,textarea,select')) return;
    e.preventDefault(); mx=e.touches[0].clientX; my=e.touches[0].clientY;
},{passive:false});
window.addEventListener('touchend',   ()=>{mx=my=-9999;});
window.addEventListener('touchcancel',()=>{mx=my=-9999;});
document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('again-btn').addEventListener('click', startGame);
document.getElementById('submit-btn').addEventListener('click', async () => {
    const rawName = document.getElementById('player-name').value.trim();
    const name = rawName || 'Anonymous';
    const timeSec = window._lastWinSec || 0;

    document.getElementById('name-phase').style.display = 'none';
    document.getElementById('lb-status').textContent = 'Saving…';
    document.getElementById('leaderboard-wrap').classList.remove('hidden');

    await saveScore(name, timeSec);
    const rows = await fetchLeaderboard();

    const lb = document.getElementById('lb-rows');
    lb.innerHTML = '';
    if (rows.length) {
        rows.forEach((r, i) => {
            const isMe = r.name === name && Math.abs(r.time_seconds - timeSec) < 0.01;
            const div = document.createElement('div');
            div.className = 'lb-row' + (i === 0 ? ' top1' : '') + (isMe ? ' me' : '');
            const pbSec = parseFloat(localStorage.getItem('ag_best') || 'Infinity');
            div.innerHTML =
                `<span class="lb-rank">#${i+1}</span>` +
                `<span class="lb-name">${r.name}</span>` +
                `<span class="lb-time">${formatTime(r.time_seconds * 1000)}</span>`;
            lb.appendChild(div);
        });
        document.getElementById('lb-status').textContent = '';
    } else {
        document.getElementById('lb-status').textContent = 'Could not load scores.';
    }

    const pbSec = parseFloat(localStorage.getItem('ag_best') || 'Infinity');
    if (isFinite(pbSec)) {
        const pbNote = document.createElement('div');
        pbNote.className = 'lb-row';
        pbNote.style.marginTop = '8px';
        pbNote.style.opacity = '0.7';
        pbNote.innerHTML = `<span class="lb-name">Your personal best:</span><span class="lb-time">${formatTime(pbSec * 1000)}</span>`;
        lb.appendChild(pbNote);
    }
});

// ════════════════════════ BOOT ════════════════════════
function loop(){update();render();requestAnimationFrame(loop);}
loadAssets().then(()=>{});
initGame();
loop();
</script>

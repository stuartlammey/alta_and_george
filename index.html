<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alta &amp; George: Skyward</title>
    <style>
        html {
            height: -webkit-fill-available;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            width: 100vw;
            height: 100vh;
            min-height: -webkit-fill-available;
            min-height: 100dvh;
            overflow: hidden;
            touch-action: none;
            background: linear-gradient(175deg, #2e7dc4 0%, #5ba4e5 25%, #87ceeb 60%, #c8e8f7 100%);
            cursor: crosshair;
        }

        #scene {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .cloud {
            position: absolute;
            pointer-events: none;
            filter: drop-shadow(0 10px 20px rgba(0, 50, 120, 0.18));
        }

        #balloon-wrap {
            position: absolute;
            width: min(200px, 50vw);
            height: min(280px, 70vw);
            transform: translate(-50%, -50%);
            pointer-events: none;
            will-change: left, top, transform;
            filter: drop-shadow(0 14px 28px rgba(0, 40, 100, 0.3));
        }

        .title {
            position: fixed;
            top: 22px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.95);
            font-family: Georgia, 'Times New Roman', serif;
            font-size: clamp(1.2rem, 5vw, 2.2rem);
            font-style: italic;
            text-shadow: 0 2px 20px rgba(0, 60, 140, 0.45);
            pointer-events: none;
            z-index: 20;
            letter-spacing: 0.08em;
            user-select: none;
        }
    </style>
</head>
<body>
<div id="scene">
    <h1 class="title">Alta &amp; George: Skyward</h1>
    <div id="clouds"></div>

    <div id="balloon-wrap">
        <svg viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
            <defs>
                <!-- Alta's fur as balloon envelope fill (covers bounding box of envelope path) -->
                <pattern id="fur-balloon" patternUnits="userSpaceOnUse" x="22" y="8" width="156" height="170">
                    <image href="images/alta-fur.jpg" xlink:href="images/alta-fur.jpg"
                           x="0" y="0" width="156" height="170" preserveAspectRatio="xMidYMid slice"/>
                </pattern>

                <!-- Circular crops for basket photos -->
                <clipPath id="alta-photo-clip">
                    <circle cx="79" cy="225" r="20"/>
                </clipPath>
                <clipPath id="george-photo-clip">
                    <circle cx="121" cy="225" r="18"/>
                </clipPath>
            </defs>

            <!-- Envelope shadow -->
            <ellipse cx="103" cy="112" rx="72" ry="76" fill="rgba(0,0,0,0.10)"/>

            <!-- Fur-textured envelope -->
            <path d="M100,8 C148,8 178,44 178,92 C178,140 148,170 100,178 C52,170 22,140 22,92 C22,44 52,8 100,8 Z"
                  fill="url(#fur-balloon)" stroke="#bbb" stroke-width="1.5"/>

            <!-- White softening overlay — keeps fur readable as fabric -->
            <path d="M100,8 C148,8 178,44 178,92 C178,140 148,170 100,178 C52,170 22,140 22,92 C22,44 52,8 100,8 Z"
                  fill="white" opacity="0.20"/>

            <!-- Envelope highlight -->
            <ellipse cx="70" cy="68" rx="16" ry="26"
                     fill="white" opacity="0.28"
                     transform="rotate(-18,70,68)"/>

            <!-- Ropes -->
            <line x1="52"  y1="172" x2="63"  y2="204" stroke="#7a5c10" stroke-width="1.5"/>
            <line x1="74"  y1="177" x2="72"  y2="204" stroke="#7a5c10" stroke-width="1.5"/>
            <line x1="100" y1="178" x2="100" y2="204" stroke="#7a5c10" stroke-width="1.5"/>
            <line x1="126" y1="177" x2="128" y2="204" stroke="#7a5c10" stroke-width="1.5"/>
            <line x1="148" y1="172" x2="137" y2="204" stroke="#7a5c10" stroke-width="1.5"/>

            <!-- Basket body -->
            <path d="M60,202 Q60,198 64,198 L136,198 Q140,198 140,202 L140,248
                     Q140,253 136,253 L64,253 Q60,253 60,248 Z"
                  fill="#c8a565" stroke="#7a5c10" stroke-width="2"/>

            <!-- Basket top rim -->
            <rect x="58" y="196" width="84" height="8" rx="3"
                  fill="#a87c3a" stroke="#7a5c10" stroke-width="1.5"/>

            <!-- Basket weave lines -->
            <line x1="80"  y1="204" x2="80"  y2="253" stroke="#7a5c10" stroke-width="1" opacity="0.4"/>
            <line x1="100" y1="204" x2="100" y2="253" stroke="#7a5c10" stroke-width="1" opacity="0.4"/>
            <line x1="120" y1="204" x2="120" y2="253" stroke="#7a5c10" stroke-width="1" opacity="0.4"/>
            <line x1="60"  y1="220" x2="140" y2="220" stroke="#7a5c10" stroke-width="1" opacity="0.4"/>
            <line x1="60"  y1="236" x2="140" y2="236" stroke="#7a5c10" stroke-width="1" opacity="0.4"/>

            <!-- Alta photo, circular crop -->
            <image href="images/alta.jpg" xlink:href="images/alta.jpg"
                   x="59" y="205" width="40" height="40"
                   clip-path="url(#alta-photo-clip)" preserveAspectRatio="xMidYMid slice"/>
            <circle cx="79" cy="225" r="20" fill="none" stroke="#7a5c10" stroke-width="1" opacity="0.5"/>

            <!-- George photo, circular crop -->
            <image href="images/george.jpg" xlink:href="images/george.jpg"
                   x="103" y="207" width="36" height="36"
                   clip-path="url(#george-photo-clip)" preserveAspectRatio="xMidYMid slice"/>
            <circle cx="121" cy="225" r="18" fill="none" stroke="#7a5c10" stroke-width="1" opacity="0.5"/>

        </svg>
    </div>
</div>

<script>
    // ─────────────────────────────────────────────
    //  CONFIG
    // ─────────────────────────────────────────────
    const FUR_SRC = 'images/alta-fur.jpg';

    const CLOUD_DEFS = [
        { x:  4, y:  7, w: 250, h: 135,
          circles: [{cx:65,cy:90,r:58},{cx:120,cy:62,r:52},{cx:185,cy:84,r:55},{cx:105,cy:100,r:46}] },
        { x: 66, y:  5, w: 210, h: 115,
          circles: [{cx:55,cy:76,r:46},{cx:108,cy:52,r:50},{cx:162,cy:72,r:44}] },
        { x: 38, y: 60, w: 190, h: 106,
          circles: [{cx:52,cy:70,r:42},{cx:98,cy:46,r:46},{cx:146,cy:66,r:40}] },
        { x:  0, y: 52, w: 230, h: 124,
          circles: [{cx:62,cy:82,r:54},{cx:116,cy:58,r:50},{cx:170,cy:78,r:48}] },
        { x: 74, y: 58, w: 200, h: 112,
          circles: [{cx:54,cy:74,r:48},{cx:104,cy:50,r:46},{cx:154,cy:70,r:48}] },
        { x: 28, y: 18, w: 170, h:  96,
          circles: [{cx:46,cy:62,r:38},{cx:90,cy:42,r:40},{cx:130,cy:60,r:38}] },
    ];

    // ─────────────────────────────────────────────
    //  BUILD CLOUDS
    // ─────────────────────────────────────────────
    function buildCloud(def, idx) {
        const { w, h, circles } = def;
        const clipId = `cc${idx}`;
        const bottomY = Math.max(...circles.map(c => c.cy));
        const circleMarkup = circles
            .map(c => `<circle cx="${c.cx}" cy="${c.cy}" r="${c.r}"/>`)
            .join('');

        return `<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
                     width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
  <defs>
    <clipPath id="${clipId}">
      ${circleMarkup}
      <rect x="0" y="${bottomY}" width="${w}" height="${h - bottomY + 2}"/>
    </clipPath>
  </defs>
  <image href="${FUR_SRC}" xlink:href="${FUR_SRC}"
         x="0" y="0" width="${w}" height="${h}"
         clip-path="url(#${clipId})" preserveAspectRatio="xMidYMid slice"/>
  <rect x="0" y="0" width="${w}" height="${h}"
        fill="white" opacity="0.50" clip-path="url(#${clipId})"/>
</svg>`;
    }

    const cloudsContainer = document.getElementById('clouds');
    const cloudEls = [];

    CLOUD_DEFS.forEach((def, i) => {
        const wrap = document.createElement('div');
        wrap.className = 'cloud';
        wrap.style.cssText = `position:absolute; left:${def.x}vw; top:${def.y}vh;`;
        wrap.innerHTML = buildCloud(def, i);
        cloudsContainer.appendChild(wrap);
        cloudEls.push(wrap);
    });

    // ─────────────────────────────────────────────
    //  POINTER TRACKING — mouse + touch unified
    // ─────────────────────────────────────────────
    let mx = -9999;
    let my = -9999;

    // Desktop
    window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
    window.addEventListener('mouseleave', () => { mx = -9999; my = -9999; });

    // Mobile — preventDefault stops page scroll/zoom while dragging
    window.addEventListener('touchstart', e => {
        e.preventDefault();
        mx = e.touches[0].clientX;
        my = e.touches[0].clientY;
    }, { passive: false });

    window.addEventListener('touchmove', e => {
        e.preventDefault();
        mx = e.touches[0].clientX;
        my = e.touches[0].clientY;
    }, { passive: false });

    window.addEventListener('touchend',   () => { mx = -9999; my = -9999; });
    window.addEventListener('touchcancel',() => { mx = -9999; my = -9999; });

    // ─────────────────────────────────────────────
    //  BALLOON PHYSICS
    // ─────────────────────────────────────────────
    const balloonWrap = document.getElementById('balloon-wrap');

    let bx = window.innerWidth  / 2;
    let by = window.innerHeight / 2;
    let vx = 0;
    let vy = 0;
    let tick = 0;

    const REPEL_RADIUS = 320;
    const REPEL_FORCE  = 22000;
    const DAMPING      = 0.87;
    const BOUNCE_DAMP  = 0.42;
    const MARGIN       = 55;

    function frame() {
        tick++;

        const dx   = bx - mx;
        const dy   = by - my;
        const dist = Math.hypot(dx, dy) || 0.001;

        if (dist < REPEL_RADIUS) {
            const f = REPEL_FORCE / Math.max(dist * dist, 2500);
            vx += (dx / dist) * f;
            vy += (dy / dist) * f;
        }

        // Idle float
        vx += Math.sin(tick * 0.00085) * 0.06;
        vy += Math.sin(tick * 0.00110 + 1.2) * 0.09;

        vx *= DAMPING;
        vy *= DAMPING;

        bx += vx;
        by += vy;

        const W = window.innerWidth;
        const H = window.innerHeight;
        if (bx < MARGIN)     { bx = MARGIN;     vx =  Math.abs(vx) * BOUNCE_DAMP; }
        if (bx > W - MARGIN) { bx = W - MARGIN; vx = -Math.abs(vx) * BOUNCE_DAMP; }
        if (by < MARGIN)     { by = MARGIN;      vy =  Math.abs(vy) * BOUNCE_DAMP; }
        if (by > H - MARGIN) { by = H - MARGIN;  vy = -Math.abs(vy) * BOUNCE_DAMP; }

        const tilt = Math.min(Math.max(vx * 1.8, -14), 14);
        balloonWrap.style.left      = bx + 'px';
        balloonWrap.style.top       = by + 'px';
        balloonWrap.style.transform = `translate(-50%, -50%) rotate(${tilt}deg)`;

        // Cloud parallax
        const sceneX = (bx - W / 2) / W;
        const sceneY = (by - H / 2) / H;
        cloudEls.forEach((el, i) => {
            const pf = 0.018 + i * 0.007;
            el.style.transform = `translate(${sceneX * pf * W}px, ${sceneY * pf * H}px)`;
        });

        requestAnimationFrame(frame);
    }

    requestAnimationFrame(frame);
</script>
</body>
</html>
